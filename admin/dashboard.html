<!-- =========================
DASHBOARD.HTML
========================= -->
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Amertak Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#050816;
    color:#fff;
    min-height:100vh;
}

header{
    width:100%;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,.08);
    background:rgba(10,15,35,.8);
    backdrop-filter:blur(15px);
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:bold;
    background:linear-gradient(
    135deg,
    #00ffcc,
    #7c3aed
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logout-btn{
    border:none;
    padding:12px 22px;
    border-radius:14px;
    background:#ff4d6d;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
}

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
    padding:40px 20px;
}

.stats{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:35px;
}

.card{
    background:#0f172a;
    border:1px solid rgba(255,255,255,.06);
    border-radius:24px;
    padding:25px;
}

.card h2{
    font-size:35px;
    margin-bottom:10px;
}

.card p{
    color:#94a3b8;
}

.orders-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(340px,1fr));
    gap:25px;
}

.order-card{
    background:#0f172a;
    border-radius:24px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.06);
}

.order-card img{
    width:100%;
    height:230px;
    object-fit:cover;
}

.order-content{
    padding:22px;
}

.order-content h3{
    margin-bottom:10px;
    font-size:24px;
}

.rank{
    color:#94a3b8;
    margin-bottom:15px;
}

.status{
    display:inline-block;
    padding:8px 16px;
    border-radius:999px;
    font-size:14px;
    margin-bottom:20px;
    font-weight:bold;
}

.actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.actions button{
    flex:1;
    min-width:100px;
    height:48px;
    border:none;
    border-radius:14px;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
}

.approve{
    background:#00c896;
}

.reject{
    background:#ff4d6d;
}

.delete{
    background:#334155;
}

.loading{
    text-align:center;
    color:#94a3b8;
    padding:40px;
}

.empty{
    text-align:center;
    color:#64748b;
    padding:40px;
}

</style>

</head>
<body>

<header>

    <div class="logo">
        Amertak DB
    </div>

    <button
    class="logout-btn"
    onclick="logout()">

    Logout

    </button>

</header>

<div class="container">

    <div class="stats">

        <div class="card">

            <h2 id="totalOrders">
            0
            </h2>

            <p>Total Orders</p>

        </div>

        <div class="card">

            <h2 id="approvedOrders">
            0
            </h2>

            <p>Approved</p>

        </div>

        <div class="card">

            <h2 id="rejectedOrders">
            0
            </h2>

            <p>Rejected</p>

        </div>

    </div>

    <div
    class="orders-grid"
    id="orders">

    <div class="loading">
        Loading Orders...
    </div>

    </div>

</div>

<script>

const API =
"https://amertak-backend.onrender.com";

const ordersContainer =
document.getElementById(
"orders"
);

const token =
localStorage.getItem(
"token"
);

if(!token){

    location.href =
    "login.html";

}

async function loadOrders(){

    try{

        const response =
        await fetch(

            API + "/orders",

            {

                headers:{

                    Authorization:
                    `Bearer ${token}`

                }

            }

        );

        const orders =
        await response.json();

        if(

        orders.success === false

        ){

            localStorage.removeItem(
            "token"
            );

            location.href =
            "login.html";

            return;

        }

        ordersContainer.innerHTML =
        "";

        let approved = 0;
        let rejected = 0;

        document.getElementById(
        "totalOrders"
        ).innerText =
        orders.length;

        orders.forEach(order=>{

            let statusColor =
            "#334155";

            if(
            order.status ===
            "approved"
            ){

                approved++;

                statusColor =
                "#00c896";

            }

            if(
            order.status ===
            "rejected"
            ){

                rejected++;

                statusColor =
                "#ff4d6d";

            }

            ordersContainer.innerHTML += `

            <div class="order-card">

                <img
                src="${API}/uploads/${order.image}">

                <div class="order-content">

                    <h3>
                    ${order.username}
                    </h3>

                    <div class="rank">
                    Rank:
                    ${order.rank}
                    </div>

                    <div
                    class="status"

                    style="background:${statusColor}">

                    ${order.status}

                    </div>

                    <div class="actions">

                        <button
                        class="approve"

                        onclick="updateStatus(
                        '${order._id}',
                        'approved'
                        )">

                        Approve

                        </button>

                        <button
                        class="reject"

                        onclick="updateStatus(
                        '${order._id}',
                        'rejected'
                        )">

                        Reject

                        </button>

                        <button
                        class="delete"

                        onclick="deleteOrder(
                        '${order._id}'
                        )">

                        Delete

                        </button>

                    </div>

                </div>

            </div>

            `;

        });

        document.getElementById(
        "approvedOrders"
        ).innerText =
        approved;

        document.getElementById(
        "rejectedOrders"
        ).innerText =
        rejected;

        if(orders.length <= 0){

            ordersContainer.innerHTML =

            `<div class="empty">
            No Orders Found
            </div>`;

        }

    }

    catch(err){

        ordersContainer.innerHTML =

        `<div class="empty">
        Failed To Load Orders
        </div>`;

    }

}

loadOrders();

async function updateStatus(
id,
status
){

    await fetch(

        API + "/update-status",

        {

            method:"POST",

            headers:{

                "Content-Type":
                "application/json",

                Authorization:
                `Bearer ${token}`

            },

            body:JSON.stringify({

                id,
                status

            })

        }

    );

    loadOrders();

}

async function deleteOrder(id){

    const confirmDelete =
    confirm(
    "Delete this order?"
    );

    if(!confirmDelete){

        return;

    }

    await fetch(

        API +
        "/delete-order/" +
        id,

        {

            method:"DELETE",

            headers:{

                Authorization:
                `Bearer ${token}`

            }

        }

    );

    loadOrders();

}

function logout(){

    localStorage.removeItem(
    "token"
    );

    location.href =
    "login.html";

}

</script>

</body>
</html>
