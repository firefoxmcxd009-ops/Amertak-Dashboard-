<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Amertak Admin Login</title>

<style>

/* =========================
RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

/* =========================
BODY
========================= */
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050816;
    overflow:hidden;
    position:relative;
}

/* =========================
BACKGROUND GLOW
========================= */
body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#00ffcc;
    filter:blur(180px);
    opacity:.12;
    top:-180px;
    left:-180px;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#7c3aed;
    filter:blur(180px);
    opacity:.12;
    bottom:-180px;
    right:-180px;
}

/* =========================
LOGIN BOX
========================= */
.login-box{
    position:relative;
    width:100%;
    max-width:430px;
    padding:40px;
    background:rgba(10,15,35,.75);
    backdrop-filter:blur(20px);
    border-radius:30px;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:
    0 0 50px rgba(0,0,0,.5);
    z-index:10;
}

/* =========================
LOGO
========================= */
.logo{
    width:90px;
    height:90px;
    margin:auto;
    margin-bottom:20px;
    border-radius:24px;
    background:linear-gradient(
    135deg,
    #00ffcc,
    #7c3aed
    );
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:36px;
    font-weight:bold;
}

/* =========================
TITLE
========================= */
h1{
    color:#fff;
    text-align:center;
    font-size:34px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:35px;
    font-size:15px;
}

/* =========================
INPUT GROUP
========================= */
.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    color:#cbd5e1;
    margin-bottom:8px;
    font-size:14px;
}

.input-group input{
    width:100%;
    height:58px;
    background:#0f172a;
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;
    outline:none;
    padding:0 18px;
    color:#fff;
    font-size:15px;
    transition:.3s;
}

.input-group input:focus{
    border-color:#00ffcc;
    box-shadow:
    0 0 0 4px rgba(0,255,204,.08);
}

/* =========================
AUTOFILL FIX
========================= */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active{

    -webkit-box-shadow:
    0 0 0 1000px #0f172a inset !important;

    -webkit-text-fill-color:
    #ffffff !important;

    caret-color:
    #ffffff !important;

    border:
    1px solid #00ffcc !important;

    transition:
    background-color 9999s ease-in-out 0s;

}

/* =========================
BUTTON
========================= */
.login-btn{
    width:100%;
    height:58px;
    border:none;
    border-radius:16px;
    background:linear-gradient(
    135deg,
    #00ffcc,
    #7c3aed
    );
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    opacity:.95;
}

/* =========================
ERROR
========================= */
.error{
    margin-top:18px;
    text-align:center;
    color:#ff4d6d;
    display:none;
    font-size:14px;
}

/* =========================
FOOTER
========================= */
.footer{
    margin-top:28px;
    text-align:center;
    color:#64748b;
    font-size:13px;
}

/* =========================
MOBILE
========================= */
@media(max-width:500px){

    .login-box{
        margin:20px;
        padding:30px;
    }

}

</style>

</head>
<body>

<!-- =========================
LOGIN BOX
========================= -->
<div class="login-box">

    <!-- LOGO -->
    <div class="logo">
        A
    </div>

    <!-- TITLE -->
    <h1>Amertak DB</h1>

    <p class="subtitle">
        Secure Admin Dashboard
    </p>

    <!-- LOGIN FORM -->
    <form id="loginForm">

        <!-- EMAIL -->
        <div class="input-group">

            <label>Email</label>

            <input
            type="email"
            id="email"
            autocomplete="email"
            placeholder="admin@amertak.com"
            required>

        </div>

        <!-- PASSWORD -->
        <div class="input-group">

            <label>Password</label>

            <input
            type="password"
            id="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required>

        </div>

        <!-- BUTTON -->
        <button
        type="submit"
        class="login-btn">

        Login

        </button>

        <!-- ERROR -->
        <div
        class="error"
        id="error">

        Invalid credentials

        </div>

    </form>

    <!-- FOOTER -->
    <div class="footer">
        Amertak Backend System
    </div>

</div>

<script>

/* =========================
API
========================= */
const API =
"https://amertak-backend.onrender.com";

/* =========================
ELEMENTS
========================= */
const loginForm =
document.getElementById(
"loginForm"
);

const error =
document.getElementById(
"error"
);

/* =========================
LOGIN
========================= */
loginForm.addEventListener(

"submit",

async(e)=>{

    e.preventDefault();

    error.style.display =
    "none";

    const email =
    document.getElementById(
    "email"
    ).value;

    const password =
    document.getElementById(
    "password"
    ).value;

    try{

        const response =
        await fetch(

            API + "/admin-login",

            {

                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({

                    email,
                    password

                })

            }

        );

        const data =
        await response.json();

        /* =========================
        SUCCESS
        ========================= */
        if(data.success){

            localStorage.setItem(

                "token",

                data.token

            );

            location.href =
            "dashboard.html";

        }

        /* =========================
        ERROR
        ========================= */
        else{

            error.innerText =
            data.message;

            error.style.display =
            "block";

        }

    }

    catch(err){

        console.log(err);

        error.innerText =
        "Server Error";

        error.style.display =
        "block";

    }

});

</script>

</body>
</html>
