<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Amertak Admin Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050816;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#00ffcc;
    filter:blur(180px);
    opacity:.15;
    top:-150px;
    left:-150px;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#7c3aed;
    filter:blur(180px);
    opacity:.15;
    bottom:-150px;
    right:-150px;
}

.login-box{
    position:relative;
    width:100%;
    max-width:420px;
    padding:40px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(10,15,35,.75);
    backdrop-filter:blur(20px);
    border-radius:28px;
    box-shadow:
    0 0 40px rgba(0,0,0,.5);
}

.logo{
    width:80px;
    height:80px;
    margin:auto;
    margin-bottom:20px;
    border-radius:20px;
    background:linear-gradient(
    135deg,
    #00ffcc,
    #7c3aed
    );
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    color:#fff;
    font-weight:bold;
}

h1{
    color:#fff;
    text-align:center;
    margin-bottom:10px;
    font-size:32px;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:35px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:14px;
}

.input-group input{
    width:100%;
    height:55px;
    border:none;
    outline:none;
    padding:0 18px;
    border-radius:16px;
    background:#0f172a;
    color:#fff;
    font-size:15px;
    border:1px solid rgba(255,255,255,.06);
}

.input-group input:focus{
    border-color:#00ffcc;
}

.login-btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:16px;
    background:linear-gradient(
    135deg,
    #00ffcc,
    #7c3aed
    );
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    opacity:.9;
}

.footer{
    text-align:center;
    margin-top:25px;
    color:#64748b;
    font-size:13px;
}

.error{
    color:#ff4d6d;
    text-align:center;
    margin-top:15px;
    display:none;
}

</style>

</head>
<body>

<div class="login-box">

    <div class="logo">
        A
    </div>

    <h1>Amertak DB</h1>

    <p class="subtitle">
        Secure Admin Dashboard
    </p>

    <form id="loginForm">

        <div class="input-group">

            <label>Email</label>

            <input
            type="email"
            id="email"
            placeholder="admin@amertak.com"
            required>

        </div>

        <div class="input-group">

            <label>Password</label>

            <input
            type="password"
            id="password"
            placeholder="••••••••"
            required>

        </div>

        <button
        type="submit"
        class="login-btn">

        Login

        </button>

        <div
        class="error"
        id="error">

        Invalid credentials

        </div>

    </form>

    <div class="footer">
        Amertak Backend System
    </div>

</div>

<script>

const API =
"https://amertak-backend.onrender.com";

const loginForm =
document.getElementById(
"loginForm"
);

const error =
document.getElementById(
"error"
);

loginForm.addEventListener(

"submit",

async(e)=>{

    e.preventDefault();

    error.style.display =
    "none";

    const email =
    document.getElementById(
    "email"
    ).value;

    const password =
    document.getElementById(
    "password"
    ).value;

    try{

        const response =
        await fetch(

            API + "/admin-login",

            {

                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({

                    email,
                    password

                })

            }

        );

        const data =
        await response.json();

        if(data.success){

            localStorage.setItem(

                "token",

                data.token

            );

            location.href =
            "dashboard.html";

        }

        else{

            error.innerText =
            data.message;

            error.style.display =
            "block";

        }

    }

    catch(err){

        error.innerText =
        "Server Error";

        error.style.display =
        "block";

    }

});

</script>

</body>
</html>
